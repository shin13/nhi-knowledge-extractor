name: tests

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege: this CI only reads code and runs tests; it does not write
# to the repo, push images, or call external services with credentials.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest -v
